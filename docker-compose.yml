services:
  nginx:
    image: nginx:alpine
    ports:
      - "0.0.0.0:9444:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    ports:
      - "100.81.134.30:8092:8092"   # Tailscale uniquement — pas d'accès internet direct
    volumes:
      - ./data:/data                  # SQLite persisté sur le host
    env_file: .env
    environment:
      - API_KEY=${API_KEY:-}
    user: "997:986"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
