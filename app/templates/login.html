<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Mon cabinet</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1 class="login-logo">Mon cabinet</h1>
      <p class="login-subtitle">Espace de gestion des dossiers</p>

      {% if flash_message %}
        <div class="flash flash-{{ flash_type | default('success') }}" role="alert" style="margin-bottom: 20px; border-radius: 4px;">
          {{ flash_message }}
        </div>
      {% endif %}

      {% if error %}
        <div class="flash flash-error" role="alert" style="margin-bottom: 20px; border-radius: 4px;">
          {{ error }}
        </div>
      {% endif %}

      <form action="{{ url_for('login_post') }}" method="post" novalidate>
        <div class="form-group">
          <label for="email">Identifiant</label>
          <input
            type="text"
            id="email"
            name="email"
            value="{{ email | default('') }}"
            required
            autocomplete="username"
            autofocus
            placeholder="aboisson"
          >
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
          <label for="password">Mot de passe</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 10px 16px;">
          Se connecter
        </button>
      </form>
    </div>
  </div>
</body>
</html>
